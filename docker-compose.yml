services:
  mongo:
    image: mongo:7
    container_name: shoppet-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    image: hienvvcode/shoppet-backend:latest
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/shoppet
      JWT_SECRET: your_super_secret_key_123
      JWT_EXPIRE: 24h
      NODE_ENV: production
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    image: hienvvcode/shoppet-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
