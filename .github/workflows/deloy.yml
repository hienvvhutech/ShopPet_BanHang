name: Deploy to DevOps Classroom

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: |
          REPO="hienvvhutech/ShopPet_BanHang"
          CONTAINER_PORT=8080
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy th·∫•t b·∫°i"
            echo "::group::Chi ti·∫øt webhook"
            echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
