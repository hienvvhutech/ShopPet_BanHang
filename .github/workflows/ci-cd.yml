name: CI-CD ShopPet

on:
  push:
    branches:
      - main

jobs:
  build-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shoppet-backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shoppet-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shoppet-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shoppet-frontend:latest

      - name: Call n8n webhook
        run: |
          curl -X POST "${{ secrets.DEPLOY_URL }}" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d '{
              "project": "ShopPet_BanHang",
              "branch": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}",
              "status": "success",
              "backend_image": "${{ secrets.DOCKERHUB_USERNAME }}/shoppet-backend:latest",
              "frontend_image": "${{ secrets.DOCKERHUB_USERNAME }}/shoppet-frontend:latest"
            }'
